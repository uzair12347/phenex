version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       phenex
      POSTGRES_USER:     phenex_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV:    development
      PORT:        3000
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     phenex
      DB_USER:     phenex_user
      DB_PASSWORD: changeme
      REDIS_URL:   redis://redis:6379
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  pgdata:
